<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KEDA Autoscaling Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; padding: 2rem; }
    h1 { font-size: 1.4rem; color: #fff; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }
    .cards { display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .card { background: #1c1f2e; border-radius: 10px; padding: 1.5rem 2rem; flex: 1; min-width: 160px; }
    .card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .card .value { font-size: 2.5rem; font-weight: 700; color: #fff; }
    .card .value.green { color: #4ade80; }
    .card .value.yellow { color: #facc15; }
    .card .value.red { color: #f87171; }
    .section-title { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .bar-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .bar-label { width: 80px; font-size: 0.8rem; color: #aaa; }
    .bar-track { flex: 1; background: #2a2d3e; border-radius: 4px; height: 18px; overflow: hidden; }
    .bar-fill { height: 100%; background: #6366f1; border-radius: 4px; transition: width 0.5s ease; }
    .bar-count { width: 60px; text-align: right; font-size: 0.8rem; color: #ccc; }
    .status { margin-top: 2rem; font-size: 0.75rem; color: #555; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; margin-right: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <h1>KEDA Autoscaling Dashboard</h1>
  <p class="subtitle">Auto-refreshes every 3 seconds</p>

  <div class="cards">
    <div class="card">
      <div class="label">Total Lag</div>
      <div class="value" id="totalLag">—</div>
    </div>
    <div class="card">
      <div class="label">Consumer Group</div>
      <div class="value" style="font-size:1rem;padding-top:0.5rem" id="consumerGroup">—</div>
    </div>
  </div>

  <div class="section-title">Lag per Partition</div>
  <div id="partitions"></div>

  <div class="status"><span class="dot"></span><span id="lastUpdated">Connecting...</span></div>

  <script>
    let maxLag = 1;

    async function refresh() {
      try {
        const res = await fetch('/status');
        const data = await res.json();

        const lag = data.totalLag;
        document.getElementById('consumerGroup').textContent = data.consumerGroup;

        const lagEl = document.getElementById('totalLag');
        lagEl.textContent = lag < 0 ? 'Error' : lag.toLocaleString();
        lagEl.className = 'value ' + (lag === 0 ? 'green' : lag < 500 ? 'yellow' : 'red');

        if (lag > maxLag) maxLag = lag;

        const parts = data.lagPerPartition || {};
        const sorted = Object.entries(parts).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
        const container = document.getElementById('partitions');
        container.innerHTML = sorted.map(([partition, plag]) => `
          <div class="bar-row">
            <div class="bar-label">Partition ${partition}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${maxLag > 0 ? Math.round((plag / maxLag) * 100) : 0}%"></div></div>
            <div class="bar-count">${plag.toLocaleString()}</div>
          </div>
        `).join('');

        document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('lastUpdated').textContent = 'Error: ' + e.message;
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
